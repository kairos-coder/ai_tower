<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Forge v0.3 — Entity Architecture</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --border: #3d3d5c;
            --gold: #ffd93d;
            --text: #e0e0e0;
            --accent: #6bcb77;
            --danger: #ff6b6b;
            --info: #4ec9e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            user-select: none;
        }
        .game-container {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            align-items: flex-start;
        }
        .canvas-wrapper {
            background: #0a0a14;
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        canvas { display: block; cursor: crosshair; }
        .ui-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 240px;
            max-width: 260px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8888aa;
            margin-bottom: 0.2rem;
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold);
        }
        .tool-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
        }
        .tool-section h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8888aa;
            margin-bottom: 0.5rem;
        }
        .tool-btn {
            display: block;
            width: 100%;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.35rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #1e2d4a;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            text-align: left;
            transition: all 0.15s;
        }
        .tool-btn:hover { background: #2a3d5c; border-color: #5a7a9a; }
        .tool-btn.active {
            background: #2a4a3a;
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(107, 203, 119, 0.3);
            font-weight: 600;
        }
        .tool-btn .cost {
            float: right;
            color: var(--gold);
            font-size: 0.75rem;
        }
        .tool-btn .key-hint {
            float: right;
            color: #666;
            font-size: 0.65rem;
            margin-right: 0.5rem;
            background: #1a1a30;
            padding: 0 4px;
            border-radius: 3px;
        }
        .room-legend {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            font-size: 0.7rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }
        .log-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            max-height: 180px;
            overflow-y: auto;
            font-size: 0.72rem;
            color: #aaa;
            line-height: 1.4;
        }
        .log-entry {
            padding: 0.15rem 0;
            border-bottom: 1px solid #1a1a30;
        }
        .log-entry:last-child { border-bottom: none; }
        
        .error-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            color: #ff6b6b;
            font-family: monospace;
            padding: 2rem;
            z-index: 1000;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .error-overlay.visible { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="errorOverlay" class="error-overlay"></div>

    <div class="game-container">
        <div class="canvas-wrapper">
            <canvas id="towerCanvas"></canvas>
        </div>
        <div class="ui-panel">
            <div class="stat-card">
                <div class="stat-label">💰 Funds</div>
                <div class="stat-value" id="moneyDisplay">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📊 Income / 10s</div>
                <div class="stat-value" id="incomeDisplay">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🧑‍🤝‍🧑 Population</div>
                <div class="stat-value" id="popDisplay">0</div>
            </div>

            <div class="tool-section">
                <h3>🔧 Build Tool</h3>
                <button class="tool-btn active" data-tool="residential">
                    🏠 Residential <span class="key-hint">1</span><span class="cost">$40</span>
                </button>
                <button class="tool-btn" data-tool="commercial">
                    🏪 Commercial <span class="key-hint">2</span><span class="cost">$60</span>
                </button>
                <button class="tool-btn" data-tool="utility">
                    ⚡ Utility <span class="key-hint">3</span><span class="cost">$30</span>
                </button>
                <button class="tool-btn" data-tool="elevator">
                    ↕ Elevator <span class="key-hint">4</span><span class="cost">$100</span>
                </button>
                <button class="tool-btn" data-tool="demolish">
                    💣 Demolish <span class="key-hint">0</span><span class="cost">free</span>
                </button>
            </div>

            <div class="room-legend">
                <span class="legend-item"><span class="legend-dot" style="background:#e8a87c;"></span> Res</span>
                <span class="legend-item"><span class="legend-dot" style="background:#85cdca;"></span> Com</span>
                <span class="legend-item"><span class="legend-dot" style="background:#c38d9e;"></span> Util</span>
                <span class="legend-item"><span class="legend-dot" style="background:#ff6b6b;"></span> Elev</span>
                <span style="font-size:0.65rem;color:#888;margin-top:0.25rem;">
                    ● happy &nbsp; ● neutral &nbsp; ● unhappy
                </span>
            </div>

            <div class="log-box" id="logBox">
                <div class="log-entry" style="color:#6bcb77;">▶ Loading Tower Forge...</div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════ -->
    <!-- LOAD ORDER — strict dependency chain    -->
    <!-- ═══════════════════════════════════════ -->

    <!-- Layer 0: Configuration -->
    <script src="src/config.js"></script>

    <!-- Layer 1: Entity factories -->
    <script src="entities/floor.js"></script>
    <script src="entities/elevator.js"></script>
    <script src="entities/resident.js"></script>

    <!-- Layer 2: World state -->
    <script src="src/world.js"></script>

    <!-- Layer 3: Systems -->
    <script src="systems/economy.js"></script>
    <script src="systems/elevatorsystems.js"></script>
    <script src="systems/happiness.js"></script>

    <!-- Layer 3.5: Debug verification -->
    <script>
        (function() {
            const required = {
                'CONFIG': 'src/config.js',
                'Floor': 'entities/floor.js',
                'Elevator': 'entities/elevator.js',
                'Resident': 'entities/resident.js',
                'WORLD': 'src/world.js',
                'Economy': 'systems/economy.js',
                'ElevatorSystem': 'systems/elevatorsystems.js',
                'Happiness': 'systems/happiness.js',
            };
            
            const missing = [];
            for (const [name, path] of Object.entries(required)) {
                if (typeof window[name] === 'undefined') {
                    missing.push(`  ❌ ${name} — expected from ${path}`);
                } else {
                    console.log(`  ✅ ${name} loaded`);
                }
            }
            
            if (missing.length > 0) {
                const msg = 'FAILED TO LOAD:\n' + missing.join('\n') + 
                           '\n\nCheck that these files exist with EXACT names.\n' +
                           'All filenames are lowercase.\n' +
                           'elevatorsystems.js (plural "systems")';
                
                console.error(msg);
                
                const overlay = document.getElementById('errorOverlay');
                overlay.textContent = msg;
                overlay.classList.add('visible');
            }
        })();
    </script>

    <!-- Layer 4: Simulation -->
    <script src="src/sim.js"></script>

    <!-- Layer 5: Rendering -->
    <script src="src/render.js"></script>

    <!-- Layer 6: Input -->
    <script src="src/input.js"></script>

    <!-- Layer 7: UI -->
    <script src="ui/hud.js"></script>
    <script src="ui/log.js"></script>

    <!-- Layer 8: Bootstrap -->
    <script src="main.js"></script>
</body>
</html>
