<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Builder v0.2 — Manual Grid</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --border: #3d3d5c;
            --gold: #ffd93d;
            --text: #e0e0e0;
            --accent: #6bcb77;
            --danger: #ff6b6b;
            --info: #4ec9e0;
            --residential: #e8a87c;
            --commercial: #85cdca;
            --utility: #c38d9e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            user-select: none;
        }

        .game-container {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            align-items: flex-start;
        }

        .canvas-wrapper {
            position: relative;
            background: #0a0a14;
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .ui-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 240px;
            max-width: 260px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8888aa;
            margin-bottom: 0.2rem;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold);
        }

        .tool-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
        }

        .tool-section h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8888aa;
            margin-bottom: 0.5rem;
        }

        .tool-btn {
            display: block;
            width: 100%;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.35rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #1e2d4a;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            text-align: left;
            transition: all 0.15s;
        }

        .tool-btn:hover {
            background: #2a3d5c;
            border-color: #5a7a9a;
        }

        .tool-btn.active {
            background: #2a4a3a;
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(107, 203, 119, 0.3);
            font-weight: 600;
        }

        .tool-btn .cost {
            float: right;
            color: var(--gold);
            font-size: 0.75rem;
        }

        .room-legend {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            font-size: 0.7rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }

        .log-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            max-height: 160px;
            overflow-y: auto;
            font-size: 0.72rem;
            color: #aaa;
            line-height: 1.4;
        }

        .log-entry {
            padding: 0.15rem 0;
            border-bottom: 1px solid #1a1a30;
        }

        .log-entry:last-child { border-bottom: none; }

        .instructions {
            font-size: 0.7rem;
            color: #666;
            margin-top: 0.25rem;
            line-height: 1.5;
        }

        .instructions kbd {
            background: #2a2a4a;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.65rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="canvas-wrapper">
            <canvas id="towerCanvas"></canvas>
        </div>
        <div class="ui-panel">
            <div class="stat-card">
                <div class="stat-label">💰 Funds</div>
                <div class="stat-value" id="moneyDisplay">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📊 Income / 10s</div>
                <div class="stat-value" id="incomeDisplay">$0</div>
            </div>

            <div class="tool-section">
                <h3>🔧 Build Tool</h3>
                <button class="tool-btn active" data-tool="residential" onclick="selectTool('residential')">
                    🏠 Residential <span class="cost">$40</span>
                </button>
                <button class="tool-btn" data-tool="commercial" onclick="selectTool('commercial')">
                    🏪 Commercial <span class="cost">$60</span>
                </button>
                <button class="tool-btn" data-tool="utility" onclick="selectTool('utility')">
                    ⚡ Utility <span class="cost">$30</span>
                </button>
                <button class="tool-btn" data-tool="elevator" onclick="selectTool('elevator')">
                    ↕ Elevator Shaft <span class="cost">$100</span>
                </button>
                <button class="tool-btn" data-tool="demolish" onclick="selectTool('demolish')">
                    💣 Demolish <span class="cost">free</span>
                </button>
                <div class="instructions" style="margin-top:0.5rem;">
                    <kbd>Click</kbd> grid to place<br>
                    <kbd>Scroll</kbd> to zoom/pans
                </div>
            </div>

            <div class="room-legend">
                <span class="legend-item"><span class="legend-dot" style="background:#e8a87c;"></span> Res</span>
                <span class="legend-item"><span class="legend-dot" style="background:#85cdca;"></span> Com</span>
                <span class="legend-item"><span class="legend-dot" style="background:#c38d9e;"></span> Util</span>
                <span class="legend-item"><span class="legend-dot" style="background:#ff6b6b;"></span> Elev</span>
            </div>

            <div class="log-box" id="logBox">
                <div class="log-entry" style="color:#6bcb77;">▶ Tower grid initialized</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════
        // TOWER BUILDER v0.2 — Manual Grid
        // Core: Place rooms, build elevators, manage economy
        // ═══════════════════════════════════════

        const canvas = document.getElementById('towerCanvas');
        const ctx = canvas.getContext('2d');

        // ── GRID CONFIG ──────────────────────
        const CELL_SIZE = 36;
        const GRID_COLS = 16;
        const GRID_ROWS = 24; // plenty of room to build up
        const GROUND_ROW = 18; // row index of ground level (0 = top of grid)

        canvas.width = GRID_COLS * CELL_SIZE;
        canvas.height = 600;

        // ── GAME STATE ──────────────────────
        let money = 200;
        let selectedTool = 'residential';

        // Grid: null = empty, object = { type, tenants?, income? }
        const grid = Array.from({ length: GRID_ROWS }, () => Array(GRID_COLS).fill(null));

        // Elevator shafts: array of { col, cells: Set of row indices }
        let elevatorShafts = [];

        // Simulation
        let tickAccum = 0;
        const TICK_INTERVAL = 10.0; // income every 10 seconds
        const COSTS = {
            residential: 40,
            commercial: 60,
            utility: 30,
            elevator: 100,
            demolish: 0
        };
        const ROOM_INCOME = {
            residential: 15,  // per 10s tick
            commercial: 25,
            utility: 0         // utility doesn't generate income but enables bonuses
        };
        const ROOM_COLORS = {
            residential: '#e8a87c',
            commercial: '#85cdca',
            utility: '#c38d9e',
            elevator: '#ff6b6b'
        };

        // ── LOGGING ──────────────────────────
        const logEntries = [];
        function log(msg, color = '#aaa') {
            logEntries.unshift({ msg, color });
            if (logEntries.length > 30) logEntries.pop();
            const box = document.getElementById('logBox');
            box.innerHTML = logEntries.map(e =>
                `<div class="log-entry" style="color:${e.color};">${e.msg}</div>`
            ).join('');
            box.scrollTop = 0;
        }

        // ── TOOL SELECTION ──────────────────
        function selectTool(tool) {
            selectedTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-tool="${tool}"]`)?.classList.add('active');
        }

        // ── GRID OPERATIONS ──────────────────
        function getCellFromPixel(px, py) {
            const col = Math.floor(px / CELL_SIZE);
            const row = Math.floor(py / CELL_SIZE);
            if (col < 0 || col >= GRID_COLS || row < 0 || row >= GRID_ROWS) return null;
            return { row, col };
        }

        function canPlace(row, col, type) {
            if (grid[row][col] !== null) return false;
            if (type === 'elevator') {
                // Elevators can be placed anywhere empty
                return true;
            }
            // Regular rooms: must be adjacent to an elevator shaft OR another room
            // (first room placed is free-placement anywhere)
            if (getAllPlacedCells().length === 0) return true;
            return hasAdjacentBuilding(row, col);
        }

        function hasAdjacentBuilding(row, col) {
            const neighbors = [
                [row - 1, col], [row + 1, col],
                [row, col - 1], [row, col + 1]
            ];
            for (const [r, c] of neighbors) {
                if (r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
                    if (grid[r][c] !== null) return true;
                    // Also check elevators
                    if (isElevatorCell(r, c)) return true;
                }
            }
            return false;
        }

        function isElevatorCell(row, col) {
            return elevatorShafts.some(shaft => shaft.col === col && shaft.cells.has(row));
        }

        function getAllPlacedCells() {
            const cells = [];
            for (let r = 0; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS; c++) {
                    if (grid[r][c] !== null) cells.push({ row: r, col: c });
                }
            }
            return cells;
        }

        function placeRoom(row, col, type) {
            if (!canPlace(row, col, type)) return false;

            const cost = COSTS[type];
            if (money < cost) {
                log(`❌ Need $${cost} for ${type}`, '#ff6b6b');
                return false;
            }
            if (type === 'elevator') {
                // Create elevator shaft at this column
                const shaft = { col, cells: new Set([row]) };
                elevatorShafts.push(shaft);
                grid[row][col] = { type: 'elevator' };
                money -= cost;
                log(`↕ Elevator shaft placed at column ${col}`, '#ff6b6b');
                // Auto-extend shaft downward to ground if above ground
                autoExtendShaft(shaft);
                return true;
            }

            money -= cost;
            grid[row][col] = { type };
            log(`✅ ${type} room placed at [${row},${col}]`, ROOM_COLORS[type]);
            return true;
        }

        function autoExtendShaft(shaft) {
            // Extend elevator shaft down to ground level
            const col = shaft.col;
            const minRow = Math.min(...shaft.cells);
            const maxRow = Math.max(...shaft.cells);

            // Extend downward to ground if shaft is above ground
            for (let r = maxRow + 1; r <= GROUND_ROW; r++) {
                if (r < GRID_ROWS && grid[r][col] === null) {
                    grid[r][col] = { type: 'elevator' };
                    shaft.cells.add(r);
                }
            }
            // Extend upward to top of placed cells
            for (let r = minRow - 1; r >= 0; r--) {
                if (grid[r][col] === null && hasAdjacentBuilding(r, col)) {
                    grid[r][col] = { type: 'elevator' };
                    shaft.cells.add(r);
                } else {
                    break;
                }
            }
        }

        function demolish(row, col) {
            if (grid[row][col] === null) return false;
            const cell = grid[row][col];

            if (cell.type === 'elevator') {
                // Remove from elevator shaft
                for (const shaft of elevatorShafts) {
                    if (shaft.col === col && shaft.cells.has(row)) {
                        shaft.cells.delete(row);
                        if (shaft.cells.size === 0) {
                            elevatorShafts = elevatorShafts.filter(s => s !== shaft);
                        }
                        break;
                    }
                }
            }

            grid[row][col] = null;
            log(`💣 Demolished at [${row},${col}]`, '#ff6b6b');
            return true;
        }

        // ── INCOME CALCULATION ──────────────
        function calculateTotalIncome() {
            let total = 0;
            const utilityCount = countRoomType('utility');
            const utilityBonus = 1 + (utilityCount * 0.15); // each utility boosts all income 15%

            for (let r = 0; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS; c++) {
                    const cell = grid[r][c];
                    if (cell && cell.type !== 'elevator' && cell.type !== 'utility') {
                        total += (ROOM_INCOME[cell.type] || 0) * utilityBonus;
                    }
                }
            }
            return Math.floor(total);
        }

        function countRoomType(type) {
            let count = 0;
            for (let r = 0; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS; c++) {
                    if (grid[r][c] && grid[r][c].type === type) count++;
                }
            }
            return count;
        }

        // ── SIMULATION ──────────────────────
        function simulationTick(deltaSeconds) {
            tickAccum += deltaSeconds;
            if (tickAccum >= TICK_INTERVAL) {
                tickAccum -= TICK_INTERVAL;
                const income = calculateTotalIncome();
                if (income > 0) {
                    money += income;
                    log(`💰 +$${income} income`, '#ffd93d');
                }
            }
        }

        // ── RENDERING ──────────────────────
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sky gradient
            const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, '#0a0a1e');
            skyGrad.addColorStop(0.6, '#1a1a35');
            skyGrad.addColorStop(1, '#0d0d20');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid cells
            for (let r = 0; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS; c++) {
                    const x = c * CELL_SIZE;
                    const y = r * CELL_SIZE;
                    const cell = grid[r][c];

                    // Grid lines
                    ctx.strokeStyle = '#1a1a35';
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);

                    if (cell) {
                        const color = ROOM_COLORS[cell.type] || '#555';
                        ctx.fillStyle = color;
                        ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);

                        // Icons
                        ctx.fillStyle = '#fff';
                        ctx.font = '14px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        const cx = x + CELL_SIZE / 2;
                        const cy = y + CELL_SIZE / 2;
                        if (cell.type === 'residential') ctx.fillText('🏠', cx, cy);
                        else if (cell.type === 'commercial') ctx.fillText('🏪', cx, cy);
                        else if (cell.type === 'utility') ctx.fillText('⚡', cx, cy);
                        else if (cell.type === 'elevator') ctx.fillText('↕', cx, cy);
                    } else {
                        // Empty cell — subtle hover effect handled dynamically
                        ctx.fillStyle = '#111125';
                        ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    }
                }
            }

            // Ground line
            const groundY = GROUND_ROW * CELL_SIZE;
            ctx.strokeStyle = '#6b6b3d';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.stroke();

            // Ground label
            ctx.fillStyle = '#6b6b3d';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('═══ GROUND ═══', 4, groundY - 4);

            // "Above" and "Below" indicators
            ctx.fillStyle = '#3a3a5a';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText('▲ SKY ▲', canvas.width - 8, 14);
            ctx.fillText('▼ BASEMENT ▼', canvas.width - 8, groundY + 16);
        }

        // ── UI UPDATE ───────────────────────
        function updateUI() {
            document.getElementById('moneyDisplay').textContent = `$${Math.floor(money)}`;
            document.getElementById('incomeDisplay').textContent = `$${calculateTotalIncome()}`;
        }

        // ── MOUSE HANDLING ──────────────────
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;
            const cell = getCellFromPixel(px, py);
            if (!cell) return;

            const { row, col } = cell;

            if (selectedTool === 'demolish') {
                if (grid[row][col] !== null) {
                    demolish(row, col);
                } else {
                    log('⚠️ Nothing to demolish here', '#888');
                }
            } else {
                if (grid[row][col] !== null) {
                    log('⚠️ Cell already occupied', '#888');
                    return;
                }
                const success = placeRoom(row, col, selectedTool);
                if (!success && money < COSTS[selectedTool]) {
                    // Already logged in placeRoom
                }
            }

            updateUI();
        });

        // Hover preview
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;
            // We repaint on every frame anyway, but could optimize
        });

        // ── GAME LOOP ──────────────────────
        let lastTime = performance.now();
        function gameLoop(timestamp) {
            const delta = Math.min((timestamp - lastTime) / 1000, 0.2);
            lastTime = timestamp;

            simulationTick(delta);
            render();
            updateUI();

            requestAnimationFrame(gameLoop);
        }

        // ── INIT ────────────────────────────
        function init() {
            // Pre-place a starter elevator shaft near center
            const startCol = Math.floor(GRID_COLS / 2);
            const shaft = { col: startCol, cells: new Set() };
            for (let r = GROUND_ROW - 4; r <= GROUND_ROW; r++) {
                if (r >= 0) {
                    grid[r][startCol] = { type: 'elevator' };
                    shaft.cells.add(r);
                }
            }
            elevatorShafts.push(shaft);

            // Pre-place a couple rooms to demonstrate adjacency
            grid[GROUND_ROW - 1][startCol - 1] = { type: 'residential' };
            grid[GROUND_ROW - 1][startCol + 1] = { type: 'commercial' };

            log('🏗️ Starter tower ready. Build adjacent to the elevator!', '#6bcb77');
            log('💡 Rooms must touch existing buildings or elevator', '#4ec9e0');
            updateUI();
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        init();
    </script>
</body>
</html>
