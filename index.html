<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Forge v0.3 — Entity Architecture</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --border: #3d3d5c;
            --gold: #ffd93d;
            --text: #e0e0e0;
            --accent: #6bcb77;
            --danger: #ff6b6b;
            --info: #4ec9e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            user-select: none;
        }
        .game-container {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            align-items: flex-start;
        }
        .canvas-wrapper {
            background: #0a0a14;
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        canvas { display: block; cursor: crosshair; }
        .ui-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 240px;
            max-width: 260px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8888aa;
            margin-bottom: 0.2rem;
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold);
        }
        .tool-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
        }
        .tool-section h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8888aa;
            margin-bottom: 0.5rem;
        }
        .tool-btn {
            display: block;
            width: 100%;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.35rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #1e2d4a;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            text-align: left;
            transition: all 0.15s;
        }
        .tool-btn:hover { background: #2a3d5c; border-color: #5a7a9a; }
        .tool-btn.active {
            background: #2a4a3a;
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(107, 203, 119, 0.3);
            font-weight: 600;
        }
        .tool-btn .cost {
            float: right;
            color: var(--gold);
            font-size: 0.75rem;
        }
        .tool-btn .key-hint {
            float: right;
            color: #666;
            font-size: 0.65rem;
            margin-right: 0.5rem;
            background: #1a1a30;
            padding: 0 4px;
            border-radius: 3px;
        }
        .room-legend {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            font-size: 0.7rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }
        .log-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            max-height: 180px;
            overflow-y: auto;
            font-size: 0.72rem;
            color: #aaa;
            line-height: 1.4;
        }
        .log-entry {
            padding: 0.15rem 0;
            border-bottom: 1px solid #1a1a30;
        }
        .log-entry:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="canvas-wrapper">
            <canvas id="towerCanvas"></canvas>
        </div>
        <div class="ui-panel">
            <div class="stat-card">
                <div class="stat-label">💰 Funds</div>
                <div class="stat-value" id="moneyDisplay">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📊 Income / 10s</div>
                <div class="stat-value" id="incomeDisplay">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🧑‍🤝‍🧑 Population</div>
                <div class="stat-value" id="popDisplay">0</div>
            </div>

            <div class="tool-section">
                <h3>🔧 Build Tool</h3>
                <button class="tool-btn active" data-tool="residential">
                    🏠 Residential <span class="key-hint">1</span><span class="cost">$40</span>
                </button>
                <button class="tool-btn" data-tool="commercial">
                    🏪 Commercial <span class="key-hint">2</span><span class="cost">$60</span>
                </button>
                <button class="tool-btn" data-tool="utility">
                    ⚡ Utility <span class="key-hint">3</span><span class="cost">$30</span>
                </button>
                <button class="tool-btn" data-tool="elevator">
                    ↕ Elevator <span class="key-hint">4</span><span class="cost">$100</span>
                </button>
                <button class="tool-btn" data-tool="demolish">
                    💣 Demolish <span class="key-hint">0</span><span class="cost">free</span>
                </button>
            </div>

            <div class="room-legend">
                <span class="legend-item"><span class="legend-dot" style="background:#e8a87c;"></span> Res</span>
                <span class="legend-item"><span class="legend-dot" style="background:#85cdca;"></span> Com</span>
                <span class="legend-item"><span class="legend-dot" style="background:#c38d9e;"></span> Util</span>
                <span class="legend-item"><span class="legend-dot" style="background:#ff6b6b;"></span> Elev</span>
                <span style="font-size:0.65rem;color:#888;margin-top:0.25rem;">
                    ● happy &nbsp; ● neutral &nbsp; ● unhappy
                </span>
            </div>

            <div class="log-box" id="logBox">
                <div class="log-entry" style="color:#6bcb77;">▶ Loading Tower Forge...</div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════ -->
    <!-- SCRIPTS — with defer for proper ordering -->
    <!-- ═══════════════════════════════════════ -->

    <!-- Layer 0: Configuration -->
    <script defer src="/ai_tower/src/config.js"></script>

    <!-- Layer 1: Entity factories -->
    <script defer src="/ai_tower/entities/floor.js"></script>
    <script defer src="/ai_tower/entities/elevator.js"></script>
    <script defer src="/ai_tower/entities/resident.js"></script>

    <!-- Layer 2: World state -->
    <script defer src="/ai_tower/src/world.js"></script>

    <!-- Layer 3: Systems -->
    <script defer src="/ai_tower/systems/economy.js"></script>
    <script defer src="/ai_tower/systems/elevatorsystems.js"></script>
    <script defer src="/ai_tower/systems/happiness.js"></script>

    <!-- Layer 4: Simulation -->
    <script defer src="/ai_tower/src/sim.js"></script>

    <!-- Layer 5: Rendering -->
    <script defer src="/ai_tower/src/render.js"></script>

    <!-- Layer 6: Input -->
    <script defer src="/ai_tower/src/input.js"></script>

    <!-- Layer 7: UI -->
    <script defer src="/ai_tower/ui/hud.js"></script>
    <script defer src="/ai_tower/ui/log.js"></script>

    <!-- Layer 8: Bootstrap -->
    <script defer src="/ai_tower/main.js"></script>

    <!-- Verification (runs after all deferred scripts execute in order) -->
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            console.log('=== TOWER FORGE LOAD CHECK ===');
            const modules = ['CONFIG', 'Floor', 'Elevator', 'Resident', 'WORLD', 'Economy', 'ElevatorSystem', 'Happiness'];
            let allGood = true;
            for (const m of modules) {
                if (typeof window[m] !== 'undefined') {
                    console.log('  ✅', m);
                } else {
                    console.error('  ❌', m, '— failed to load');
                    allGood = false;
                }
            }
            if (allGood) {
                console.log('✅ All modules loaded! Start the tower!');
            } else {
                console.error('❌ Some modules failed. Check Network tab in DevTools.');
            }
        });
    </script>
    <script>
// ═══════════════════════════════════════════
// PATCH: Ensure all modules attach to window
// ═══════════════════════════════════════════
(function() {
    // List of module names to check and patch
    const modules = [
        'CONFIG',
        'Floor', 
        'Elevator',
        'Resident',
        'WORLD',
        'Economy',
        'ElevatorSystem',
        'Happiness',
        'SIM',
        'RENDER',
        'INPUT',
        'HUD',
        'Log',
        'GAME'
    ];
    
    // Wait for all scripts to execute
    window.addEventListener('load', function() {
        console.log('=== PATCH DIAGNOSTIC ===');
        
        for (const name of modules) {
            // Check both ways - as a global variable and on window
            try {
                const exists = eval('typeof ' + name) !== 'undefined';
                const onWindow = typeof window[name] !== 'undefined';
                
                if (exists && !onWindow) {
                    // It exists as a variable but not on window — attach it
                    window[name] = eval(name);
                    console.log('  🔧 Patched:', name, '→ window.' + name);
                } else if (exists && onWindow) {
                    console.log('  ✅', name, 'already on window');
                } else {
                    console.error('  ❌', name, 'not defined at all');
                }
            } catch(e) {
                console.error('  ❌', name, '— error:', e.message);
            }
        }
        
        // If GAME exists but didn't init, call init manually
        if (typeof window.GAME !== 'undefined' && !window.GAME.running) {
            console.log('🚀 Calling GAME.init() manually...');
            window.GAME.init();
        }
    });
})();
</script>
</body>
</html>
